# Install on server as: /etc/nginx/conf.d/product.xyptkd.cn.conf
# Site root must match docs/infrastructure.md (default /var/web/my_product).

server {
    listen 80;
    listen [::]:80;
    server_name product.xyptkd.cn;

    root /var/web/my_product;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
