# Install on server as: /etc/nginx/conf.d/product.xyptkd.cn.conf
# HTTP only + ACME webroot (before or alongside TLS). Site root must match infrastructure.md.
# After certificates exist, run remote-ssl-certbot-my-product.sh to switch to nginx-product.xyptkd.cn.full.conf.

server {
    listen 80;
    listen [::]:80;
    server_name product.xyptkd.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /var/web/my_product;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
