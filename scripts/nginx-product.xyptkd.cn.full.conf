# Install on server as: /etc/nginx/conf.d/product.xyptkd.cn.conf (after Let's Encrypt certs exist).
# Deployed by remote-ssl-certbot-my-product.sh. Replaces HTTP-only config.

server {
    listen 80;
    listen [::]:80;
    server_name product.xyptkd.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name product.xyptkd.cn;

    ssl_certificate /etc/letsencrypt/live/product.xyptkd.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/product.xyptkd.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/web/my_product;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
